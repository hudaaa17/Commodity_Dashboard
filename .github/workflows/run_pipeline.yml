name: Run Commodity Pipeline

on:
  schedule:
    # Runs daily at 3:30 AM UTC = 9:00 AM IST
    - cron: "30 3 * * *"

  workflow_dispatch:  # allows manual run from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout repo
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Setup Python
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      # ----------------------------
      # 3. Install dependencies
      # ----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------
      # 4. Run pipeline
      # ----------------------------
      - name: Run full pipeline
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          RAW_SPREADSHEET_ID: ${{ secrets.RAW_SPREADSHEET_ID }}
          TRAINING_SPREADSHEET_ID: ${{ secrets.TRAINING_SPREADSHEET_ID }}
          ZINC_API_KEY: ${{ secrets.ZINC_API_KEY }}

        run: |
          python mainpipeline.py
