name: Run Commodity Pipeline

on:
  schedule:
    # Runs daily at 3:30 AM UTC = 9:00 AM IST
    - cron: "30 3 * * *"
  workflow_dispatch:  # allows manual run from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ← opt into Node 24

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 1. Checkout repo
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # 2. Setup Python
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------
      # 3. Install Chrome and ChromeDriver
      # ----------------------------
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          echo "CHROME_PATH=$(which google-chrome-stable)" >> $GITHUB_ENV

      # ----------------------------
      # 4. Install dependencies
      # ----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------
      # 5. Run pipeline
      # ----------------------------
      - name: Run full pipeline
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          RAW_SPREADSHEET_ID: ${{ secrets.RAW_SPREADSHEET_ID }}
          TRAINING_SPREADSHEET_ID: ${{ secrets.TRAINING_SPREADSHEET_ID }}
          ZINC_API_KEY: ${{ secrets.ZINC_API_KEY }}
        run: |
          python mainpipeline.py
